<script>
  function setIsNight(isNight) {
    localStorage.setItem('isNight', isNight)
  }

  function getIsNight() {
    return localStorage.getItem('isNight')
  }

  function switchTheme() {
    let isNight = getIsNight()
    if (isNight === 'false') {
      document.documentElement.className = 'dark'
      document.getElementsByClassName('theme-switcher')[0].textContent = '🌛'
      setIsNight('true')
    } else {
      document.documentElement.className = 'light'
      document.getElementsByClassName('theme-switcher')[0].textContent = '🌞'
      setIsNight('false')
    }
  }

  let isNight = getIsNight()
  if (isNight == null) {
    isNight = 'false'
    setIsNight('false')
  }
  if (isNight === 'false') {
    document.documentElement.className = 'light'
  } else {
    document.documentElement.className = 'dark'
  }
</script>

  <h3>活动图</h3>
  
<div id="calendar_box" style="width:100%;overflow-x:auto;overflow-y:hidden;">
<div id="calendar" style="width: 600px;height:185px;"></div>

<script type="text/javascript">
  (function(){
    function dateFormat(date){
      date = new Date(date)
      return date.getFullYear() + '-' + (date.getMonth() + 1).toString().padStart(2, '0') + '-' + date.getDate().toString().padStart(2, '0')
    }
    let calendarChart = echarts.init(document.getElementById('calendar'));
    let endDate = new Date().getTime()
    let startDate = new Date(endDate - 40*7*24*3600*1000).getTime()
    let startDay = Math.ceil(startDate/(24*3600*1000))
    let endDay = Math.ceil(endDate/(24*3600*1000))

    let commitData = {"2023-11-23":1,"2023-11-22":3,"2023-11-20":2,"2023-11-10":1,"2023-11-09":1,"2023-11-08":2,"2023-11-05":2,"2023-10-31":1,"2023-10-24":2,"2023-10-22":1,"2023-10-21":1,"2023-10-20":1,"2023-10-19":1,"2023-10-17":2,"2023-10-16":1,"2023-10-13":1,"2023-10-11":3,"2023-10-08":2,"2023-09-29":1,"2023-09-28":1,"2023-09-27":1,"2023-09-26":2,"2023-09-25":2,"2023-09-23":1,"2023-09-18":1,"2023-09-14":2,"2023-09-13":2,"2023-09-12":1,"2023-09-11":1,"2023-09-10":1,"2023-09-09":2,"2023-09-01":2,"2023-08-31":2,"2023-08-30":2,"2023-08-29":3,"2023-08-27":1,"2023-08-13":2,"2023-08-09":1,"2023-08-07":1,"2023-08-06":1,"2023-08-05":2,"2023-07-31":2,"2023-07-30":2,"2023-07-29":1,"2023-07-26":1,"2023-07-24":1,"2023-07-23":1,"2023-07-17":3,"2023-07-16":5,"2023-07-10":1,"2023-07-09":1,"2023-07-07":1,"2023-07-06":2,"2023-07-05":4,"2023-07-04":1,"2023-07-03":11}
    let seriesData = []

    for(let i = startDay;i <= endDay;i++){
      let date = i*24*3600*1000
      let formatDate = dateFormat(date)
      let times = commitData[formatDate] || 0
      seriesData.push([formatDate, times])
    }
    let option = {
      title: {
        text: "",
        x: "center"
      },
      backgroundColor: "#FFFFFF",
      tooltip: {
        padding: 10,
        backgroundColor: "#555",
        borderColor: "#777",
        borderWidth: 1,
        formatter: function(a) {
          var b = a.value;
          return '<div style="font-size: 14px;">' + b[0] + "：" + b[1] + "</div>"
        }
      },
      visualMap: {
        show: !1,
        showLabel: !0,
        min: 0,
        max: 4,
        calculable: !1,
        inRange: {
          symbol: "rect",
          color: ["#ebedf0", "#c6e48b", "#7bc96f", "#239a3b", "#196127"]
        },
        itemWidth: 12,
        itemHeight: 12,
        orient: "horizontal",
        left: "center",
        top: 0
      },
      calendar: [{
        top: 50,
        left: "center",
        range: [dateFormat(startDate), dateFormat(endDate)],
        cellSize: [13, 13],
        splitLine: {
          show: !1
        },
        name: {
          textStyle: {
            color: "#3C4858"
          }
        },
        itemStyle: {
          borderColor: "#fff",
          borderWidth: 2
        },
        yearLabel: {
          show: !1
        },
        monthLabel: {
          nameMap: "cn",
          fontSize: 11,
          color: "#3C4858"
        },
        dayLabel: {
          formatter: "{start} 1st",
          nameMap: "cn",
          fontSize: 11,
          color: "#3C4858"
        }
      }],
      series: [{
        type: "heatmap",
        coordinateSystem: "calendar",
        calendarIndex: 0,
        data: seriesData
      }]
    };

    calendarChart.setOption(option);

    let box = document.getElementById("calendar_box")
    let child = document.getElementById("calendar")
    window.addEventListener('load',function(){
        box.scrollLeft = (child.clientWidth - box.clientWidth) / 2
    })

  })();
</script>
